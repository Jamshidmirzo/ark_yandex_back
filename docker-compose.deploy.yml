# Droplet bundle — Vercel hosts the frontend, so NO frontend service here.
# Services: redis, backend, dispatcher, caddy.
# Backend is NOT published to the host (expose, not ports) — only Caddy reaches
# it over the compose network. Caddy terminates TLS and publishes 80 + 443.
#
# Requires a sibling .env (gitignored) that sets SECRET_KEY — see the runbook.
# Run from the repo root on the droplet:
#   docker compose -f docker-compose.deploy.yml up -d --build
services:
  # Shared channel layer for WebSockets — lets the auto-dispatch WORKER (a
  # separate process) push assignment/route updates that reach the web's WS
  # consumers. In-memory would never cross process boundaries.
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: .
    image: ark-yandex-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////data/db.sqlite3
      # MANDATORY: exact Vercel origin, no trailing slash. CORS_ALLOW_CREDENTIALS
      # is True in settings.py so a wildcard is impossible — this exact string is
      # the only thing that lets the browser API calls through.
      CORS_ALLOWED_ORIGINS: https://arkyandex.vercel.app
      # MANDATORY on a public box: the committed config/.env and the settings.py
      # fallback both ship an INSECURE, git-published SECRET_KEY. With SIMPLE_JWT
      # on HS256, anyone with that key can forge JWTs for any user (incl. the
      # seeded superuser). Injected from the gitignored sibling .env; refuse to
      # boot if unset.
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in a sibling .env (see runbook)}
      DEBUG: "False"
      ALLOWED_HOSTS: 164-90-176-107.nip.io,164.90.176.107,localhost,127.0.0.1
      # Only used once you apply the optional settings.py hardening (admin panel).
      CSRF_TRUSTED_ORIGINS: https://164-90-176-107.nip.io
      # Real backend (DEV/demo) — ALL /api/v1/* is reverse-proxied here.
      UPSTREAM_API_BASE: https://demo.ark.glob.uz/ru/api/v1
      # Durable, cross-process WS channel layer (channels_redis).
      REDIS_URL: redis://redis:6379/0
    # expose (NOT ports): 8000 is reachable only by Caddy over the compose
    # network, never on the public IPv4/IPv6.
    expose:
      - "8000"
    volumes:
      - backend_data:/data
    # Lets the dispatcher wait for migrations/seed to finish (avoids the
    # cold-start race where it polls a not-yet-migrated SQLite). /health/ is a
    # no-auth endpoint served by daphne once it is up.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health/').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    depends_on:
      - redis

  # Server-side auto-dispatch worker. Reuses the backend image, shares its DB
  # volume + redis so its WS group_sends reach the web process. Serves no HTTP.
  # Its command: overrides the entrypoint, so it does NOT run migrations itself
  # — it waits for backend to be healthy first.
  dispatcher:
    image: ark-yandex-backend
    restart: unless-stopped
    command: ["python", "manage.py", "auto_dispatch"]
    environment:
      DATABASE_URL: sqlite:////data/db.sqlite3
      AUTO_DISPATCH_ENABLED: "true"
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in a sibling .env (see runbook)}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - backend_data:/data
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started

  # TLS termination + reverse proxy. Auto-issues a Let's Encrypt cert for the
  # nip.io host and transparently upgrades WebSockets. Persists certs in named
  # volumes so a restart does NOT re-issue (which would trip rate limits).
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC); optional, Caddy publishes it by default
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  backend_data:
  caddy_data:
  caddy_config:
