# Our own stack (ark_yandex backend + ark_yandex_front), Dockerized.
# Run from this folder:  docker compose up --build
services:
  # Shared channel layer for WebSockets — lets the auto-dispatch WORKER (a separate
  # process) push assignment/route updates that reach the web's WS consumers. With
  # the in-memory layer those group_sends would never cross process boundaries.
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: .
    image: ark-yandex-backend
    environment:
      # Persisted SQLite on a named volume (survives restarts).
      DATABASE_URL: sqlite:////data/db.sqlite3
      # CORS for the dockerized frontend (served at :5173) + native vite dev.
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      # Real backend (DEV/demo) — ALL /api/v1/* is reverse-proxied here
      # (real accounts, drivers, car orders). Change to repoint the whole app.
      UPSTREAM_API_BASE: https://demo.ark.glob.uz/ru/api/v1
      # Durable, cross-process WS channel layer (channels_redis). Served via daphne
      # (ASGI) — see docker-entrypoint.sh.
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/data
    depends_on:
      - redis

  # Server-side auto-dispatch worker. Reuses the backend image, shares its DB
  # volume, and runs the «nearest free driver» assignment loop so auto-dispatch
  # works with no dispatcher tab open. Gated live by the dispatcher's in-app
  # switch (DispatchSettings) AND the AUTO_DISPATCH_ENABLED env kill-switch.
  # Shares REDIS_URL so its WS pushes reach the web process.
  dispatcher:
    image: ark-yandex-backend
    command: ["python", "manage.py", "auto_dispatch"]
    environment:
      DATABASE_URL: sqlite:////data/db.sqlite3
      AUTO_DISPATCH_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
    volumes:
      - backend_data:/data
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ../ark_yandex_front
      args:
        # Browser → backend's published port.
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    image: ark-yandex-front
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend_data:
