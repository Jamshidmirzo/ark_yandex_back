# Our own stack (ark_yandex backend + ark_yandex_front), Dockerized.
# Run from this folder:  docker compose up --build
services:
  # Shared channel layer for WebSockets — lets the auto-dispatch WORKER (a separate
  # process) push assignment/route updates that reach the web's WS consumers. With
  # the in-memory layer those group_sends would never cross process boundaries (and
  # gunicorn runs >1 UvicornWorker, so a shared layer is mandatory).
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # Primary DB (plain Postgres — identical to upstream ark-backend). Holds everything
  # except the two telemetry models.
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ark_yandex
      POSTGRES_USER: ark
      POSTGRES_PASSWORD: ark
    volumes:
      - db_data:/var/lib/postgresql/data
    # Gate the backend's entrypoint migrate on the DB actually accepting connections
    # (depends_on alone only waits for container start, not readiness).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ark -d ark_yandex"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Telemetry DB (PostGIS) — holds ONLY DriverPosition + OrderLiveLocation, routed
  # there by car_orders.routers.GeoRouter. The postgis image auto-creates the
  # extension, and migration 0026 (CreateExtension) makes it explicit/idempotent.
  geodb:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ark_geo
      POSTGRES_USER: ark
      POSTGRES_PASSWORD: ark
    volumes:
      - geo_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ark -d ark_geo"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
    image: ark-yandex-backend
    environment:
      # Primary + geo DB (POSTGRES_* style, matching ark-backend). GEO_POSTGRES_USER/
      # PASSWORD fall back to POSTGRES_* in settings, so only DB+HOST differ.
      POSTGRES_DB: ark_yandex
      POSTGRES_USER: ark
      POSTGRES_PASSWORD: ark
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      GEO_POSTGRES_DB: ark_geo
      GEO_POSTGRES_HOST: geodb
      # CORS for the dockerized frontend (served at :5173) + native vite dev.
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      # Real backend (DEV/demo) — ALL /api/v1/* is reverse-proxied here
      # (real accounts, drivers, car orders). Change to repoint the whole app.
      UPSTREAM_API_BASE: https://demo.ark.glob.uz/ru/api/v1
      # Durable, cross-process WS channel layer (channels_redis).
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
      geodb:
        condition: service_healthy

  # Server-side auto-dispatch worker. Reuses the backend image and shares the same
  # Postgres + redis (its WS group_sends reach the web process). Connects to the DBs
  # over the network — no shared volume. Overrides the entrypoint, so it does NOT run
  # migrations (the backend container migrates both DBs first).
  dispatcher:
    image: ark-yandex-backend
    command: ["python", "manage.py", "auto_dispatch"]
    environment:
      POSTGRES_DB: ark_yandex
      POSTGRES_USER: ark
      POSTGRES_PASSWORD: ark
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      GEO_POSTGRES_DB: ark_geo
      GEO_POSTGRES_HOST: geodb
      AUTO_DISPATCH_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started
      db:
        condition: service_healthy
      geodb:
        condition: service_healthy

  frontend:
    build:
      context: ../ark_yandex_front
      args:
        # Browser → backend's published port.
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    image: ark-yandex-front
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:
  geo_data:
